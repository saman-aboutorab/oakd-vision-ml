# P2 ReID Training Configuration

data:
  reid_dir: dataset/reid          # root folder containing identity subfolders
  crop_size: [128, 128]           # H x W fed to the model
  train_split: 0.8                # fraction of identities used for training

model:
  embedding_dim: 128              # output embedding size
  backbone: resnet18              # pretrained ImageNet backbone
  dropout: 0.4

sampler:
  P: 8                            # identities per batch
  K: 4                            # crops per identity → batch size = P*K = 32

loss:
  margin: 0.3                     # triplet loss margin

training:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.0005
  lr_step_epochs: [40, 70]        # drop LR by 0.1x at these epochs
  grad_clip: 1.0
  checkpoint_dir: runs/reid

wandb:
  project: oakd-vision-ml
  run_name: reid_v1
